<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТендерБот — Бронирование места</title>
    <script src="https://accounts.google.com/gsi/client" async></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --tg-bg: #17212b;
            --tg-bg-secondary: #0e1621;
            --tg-blue: #5288c1;
            --tg-msg-out: #2b5278;
            --tg-msg-in: #182533;
            --tg-text: #ffffff;
            --tg-hint: #6d7f8f;
            --green: #4fae4e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #0a0e14; color: var(--tg-text); }
        .bot-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .bot-header { padding: 16px 24px; background: var(--tg-bg); display: flex; align-items: center; gap: 14px; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
        .bot-avatar { width: 46px; height: 46px; border-radius: 50%; background: linear-gradient(135deg, var(--tg-blue), #3a7bd5); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
        .bot-header-info h3 { font-size: 17px; font-weight: 600; }
        .bot-header-info span { font-size: 13px; color: var(--tg-hint); }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 4px; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 8px; background: radial-gradient(ellipse at 50% 80%, rgba(82,136,193,0.04) 0%, transparent 60%), var(--tg-bg-secondary); }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
        .msg-date { text-align: center; font-size: 12px; color: var(--tg-hint); margin: 8px 0; }
        .message { max-width: 75%; padding: 11px 16px; border-radius: 14px; font-size: 15px; line-height: 1.5; animation: msgIn 0.3s ease; word-wrap: break-word; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-bot { align-self: flex-start; background: var(--tg-msg-in); border-bottom-left-radius: 4px; }
        .msg-user { align-self: flex-end; background: var(--tg-msg-out); border-bottom-right-radius: 4px; }
        .msg-time { font-size: 11px; color: rgba(255,255,255,0.3); text-align: right; margin-top: 5px; }
        .msg-bot .msg-time { color: var(--tg-hint); }
        .typing-indicator { align-self: flex-start; padding: 14px 18px; background: var(--tg-msg-in); border-radius: 14px; display: none; gap: 5px; align-items: center; }
        .typing-indicator.active { display: flex; }
        .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--tg-hint); animation: typingBounce 1.2s ease-in-out infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
        .input-area { padding: 14px 20px; background: var(--tg-bg); display: flex; align-items: center; gap: 10px; flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.06); }
        .chat-input { flex: 1; padding: 12px 20px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); background: var(--tg-bg-secondary); color: var(--tg-text); font-size: 15px; outline: none; transition: all 0.3s; }
        .chat-input:focus { border-color: var(--tg-blue); box-shadow: 0 0 0 2px rgba(82,136,193,0.2); }
        .chat-input::placeholder { color: var(--tg-hint); }
        .send-btn { width: 46px; height: 46px; border-radius: 50%; border: none; background: var(--tg-blue); color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; flex-shrink: 0; }
        .send-btn:hover { background: #4a7ab5; transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .quick-actions { display: flex; gap: 8px; flex-wrap: wrap; margin: 4px 0; }
        .quick-actions.align-start { align-self: flex-start; }
        .quick-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--tg-blue); background: transparent; color: var(--tg-blue); font-size: 13px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .quick-btn:hover { background: var(--tg-blue); color: white; }
        #google-login-btn { margin: 10px 0; align-self: flex-start; }
        .info-card {
            background: rgba(82, 136, 193, 0.1);
            border-left: 4px solid var(--tg-blue);
            padding: 12px 16px;
            border-radius: 12px;
            margin: 8px 0;
            font-size: 14px;
            line-height: 1.5;
            color: var(--tg-hint);
        }
        .info-card strong { color: var(--tg-text); }
        @media (max-width: 600px) { .chat-area { padding: 16px 14px; } .input-area { padding: 10px 14px; } .message { max-width: 85%; font-size: 14px; } .bot-header { padding: 12px 16px; } }
    </style>
</head>
<body>
<div class="bot-container">
    <div class="bot-header">
        <div class="bot-avatar">🤖</div>
        <div class="bot-header-info"><h3>ТендерБот</h3><span><span class="online-dot"></span>онлайн</span></div>
    </div>
    <div class="chat-area" id="chatArea"><div class="msg-date">Сегодня</div></div>
    <div class="input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Введите сообщение..." autocomplete="off">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // ==================== КОНФИГУРАЦИЯ (ОБНОВЛЁННЫЙ URL) ====================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzuzFbt2n6lDHOoMhYm_2_3oZRoEulZN6jWf5Ivo9DGky6gXTx-_bPG_Uo6Y_KMdBmiAg/exec';
    const GOOGLE_CLIENT_ID = '198238047306-u0s10ilol27lpmqemtlj1as9m963nfav.apps.googleusercontent.com';
    const PRICE = 3;                                   // ⚡ Стоимость 3 рубля
    const GROUP_LINK = 'https://t.me/+GA5yfIIAcasyYWQy';

    // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
    let botState = 'idle';
    let currentUser = null;
    let isPaid = false;

    // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ (чат) ====================
    function getCurrentTime() {
        const now = new Date();
        return now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    }
    function scrollToBottom() {
        const chatArea = document.getElementById('chatArea');
        requestAnimationFrame(() => chatArea.scrollTop = chatArea.scrollHeight);
    }
    function addMessage(text, sender, isHTML = false) {
        const chatArea = document.getElementById('chatArea');
        const msg = document.createElement('div');
        msg.className = `message msg-${sender}`;
        const content = document.createElement('div');
        if (isHTML) content.innerHTML = text.replace(/\n/g,'<br>').replace(/<b>(.*?)<\/b>/g,'<strong>$1</strong>');
        else content.textContent = text;
        msg.appendChild(content);
        const time = document.createElement('div');
        time.className = 'msg-time';
        time.textContent = getCurrentTime();
        msg.appendChild(time);
        chatArea.appendChild(msg);
        scrollToBottom();
    }
    function addInfoCard(text) {
        const chatArea = document.getElementById('chatArea');
        const card = document.createElement('div');
        card.className = 'info-card';
        card.innerHTML = text;
        chatArea.appendChild(card);
        scrollToBottom();
    }
    function addKeyboard(buttons) {
        const chatArea = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'quick-actions align-start';
        buttons.forEach(btn => {
            const b = document.createElement('button');
            b.className = 'quick-btn';
            b.textContent = btn;
            b.onclick = () => { document.getElementById('chatInput').value = btn; sendMessage(); };
            div.appendChild(b);
        });
        chatArea.appendChild(div);
        scrollToBottom();
    }
    function showTyping() {
        const chatArea = document.getElementById('chatArea');
        let typing = document.getElementById('typingIndicator');
        if (!typing) {
            typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.id = 'typingIndicator';
            typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            chatArea.appendChild(typing);
        }
        typing.classList.add('active');
        scrollToBottom();
    }
    function hideTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }
    async function botReply(responses, delay = 700) {
        showTyping();
        for (let i = 0; i < responses.length; i++) {
            await new Promise(r => setTimeout(r, delay + i*400));
            hideTyping();
            if (responses[i].type === 'keyboard') addKeyboard(responses[i].buttons);
            else addMessage(responses[i].text, 'bot', true);
            if (i < responses.length-1) showTyping();
        }
    }

    // ==================== АВТОРИЗАЦИЯ GOOGLE ====================
    async function handleCredentialResponse(response) {
        try {
            const verifyRes = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `action=verifyGoogleToken&id_token=${response.credential}`
            });
            const result = await verifyRes.json();
            if (result.success) {
                currentUser = result.user;
                localStorage.setItem('userSub', currentUser.sub);
                localStorage.setItem('userName', currentUser.name);
                await botReply([{ type: 'text', text: `✅ Добро пожаловать, ${currentUser.name}! Теперь вы можете попасть в список участников тендера.` }]);
                addKeyboard(['🎯 Попасть в список участников тендера']);
                document.getElementById('google-login-btn').style.display = 'none';
                botState = 'idle';
                await checkPaymentStatus(true);
            } else {
                await botReply([{ type: 'text', text: `❌ Ошибка входа: ${result.error}. Попробуйте другой аккаунт.` }]);
            }
        } catch (err) {
            console.error(err);
            await botReply([{ type: 'text', text: '❌ Произошла ошибка при попытке входа.' }]);
        }
    }

    // ==================== ОПЛАТА И ПРОВЕРКА ====================
    async function createPayment() {
        if (!currentUser) {
            await botReply([{ type: 'text', text: 'Пожалуйста, сначала войдите через Google.' }]);
            return false;
        }
        const returnUrl = window.location.href;
        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `action=createPayment&userSub=${encodeURIComponent(currentUser.sub)}&returnUrl=${encodeURIComponent(returnUrl)}`
            });
            const result = await response.json();
            if (result.success) {
                window.open(result.paymentUrl, '_blank');
                await botReply([{ type: 'text', text: `🔗 Ссылка на оплату (${PRICE} руб.) открыта в новой вкладке. После оплаты нажмите кнопку "Проверить оплату".` }]);
                addKeyboard(['🔍 Проверить оплату']);
                botState = 'checking_payment';
                return true;
            } else {
                await botReply([{ type: 'text', text: `❌ Ошибка при создании платежа: ${result.error}` }]);
                return false;
            }
        } catch (err) {
            console.error(err);
            await botReply([{ type: 'text', text: '❌ Не удалось связаться с сервером оплаты.' }]);
            return false;
        }
    }

    async function checkPaymentStatus(silent = false) {
        if (!currentUser) return false;
        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `action=checkPayment&userSub=${encodeURIComponent(currentUser.sub)}`
            });
            const result = await response.json();
            if (result.paid) {
                isPaid = true;
                if (!silent) {
                    await botReply([{ type: 'text', text: result.message }]);
                    addKeyboard(['🎯 Попасть в список участников тендера']);
                } else {
                    if (result.message) addMessage(result.message, 'bot', true);
                }
                botState = 'idle';
                return true;
            } else {
                if (!silent) await botReply([{ type: 'text', text: '⏳ Оплата ещё не подтверждена. Подождите немного или проверьте позже.' }]);
                return false;
            }
        } catch (err) {
            console.error(err);
            if (!silent) await botReply([{ type: 'text', text: '❌ Ошибка при проверке статуса.' }]);
            return false;
        }
    }

    // ==================== ЛОГИКА БОТА ====================
    const botResponses = {
        start: [
            { type: 'text', text: '👋 Добро пожаловать в <b>ТендерБот</b>!' }
        ],
        afterLogin: [
            { type: 'text', text: `💰 Стоимость участия: ${PRICE} руб.` },
            { type: 'text', text: 'Нажмите кнопку ниже, чтобы оплатить и попасть в список участников тендера.' }
        ]
    };

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        addMessage(text, 'user');
        input.value = '';
        const sendBtn = document.getElementById('sendBtn');
        sendBtn.disabled = true;

        if (botState === 'idle') {
            if (text.includes('попасть в список') || text.includes('🎯')) {
                if (!currentUser) {
                    await botReply([{ type: 'text', text: 'Пожалуйста, сначала войдите через Google.' }]);
                } else if (isPaid) {
                    await botReply([{ type: 'text', text: `✅ Вы уже в списке участников! Ссылка на группу: ${GROUP_LINK}` }]);
                } else {
                    await botReply(botResponses.afterLogin);
                    addKeyboard(['✅ Оплатить', '❌ Отмена']);
                    botState = 'awaiting_payment_confirm';
                }
            } else if (text.includes('привет') || text.includes('начать') || text === '/start') {
                await botReply(botResponses.start);
                if (!currentUser && !document.getElementById('google-login-btn')) {
                    const chatArea = document.getElementById('chatArea');
                    const btnDiv = document.createElement('div');
                    btnDiv.id = 'google-login-btn';
                    btnDiv.style.margin = '10px 0';
                    btnDiv.style.alignSelf = 'flex-start';
                    chatArea.appendChild(btnDiv);
                    google.accounts.id.renderButton(btnDiv, { theme: 'outline', size: 'large' });
                    scrollToBottom();
                } else if (currentUser) {
                    addKeyboard(['🎯 Попасть в список участников тендера']);
                }
            } else {
                await botReply([{ type: 'text', text: 'Я не понимаю эту команду. Нажмите "Попасть в список участников тендера" или используйте кнопки.' }]);
                if (currentUser && !isPaid) addKeyboard(['🎯 Попасть в список участников тендера', '🔍 Проверить оплату']);
                else if (currentUser && isPaid) addKeyboard(['🎯 Попасть в список участников тендера']);
            }
        } else if (botState === 'awaiting_payment_confirm') {
            if (text.includes('Оплатить') || text.includes('✅')) {
                await createPayment();
            } else {
                await botReply([{ type: 'text', text: '❌ Оплата отменена.' }]);
                botState = 'idle';
            }
        } else if (botState === 'checking_payment') {
            if (text.includes('Проверить')) {
                await checkPaymentStatus(false);
            } else {
                await botReply([{ type: 'text', text: 'Пожалуйста, нажмите "Проверить оплату".' }]);
            }
        }
        sendBtn.disabled = false;
        input.focus();
    }

    document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    // Инициализация
    window.onload = function() {
        google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            callback: handleCredentialResponse
        });
        const savedSub = localStorage.getItem('userSub');
        if (savedSub) {
            currentUser = { sub: savedSub, name: localStorage.getItem('userName') };
            checkPaymentStatus(true);
            addKeyboard(['🎯 Попасть в список участников тендера']);
        } else {
            setTimeout(async () => {
                await botReply(botResponses.start, 600);
                addInfoCard(`
                    <strong>📌 О боте</strong><br>
                    Этот бот помогает организовать участие в тендере. Вы сможете:
                    <ul style="margin: 8px 0 0 20px; padding-left: 0;">
                        <li>✅ Забронировать место</li>
                        <li>✅ Оплатить участие (${PRICE} руб.)</li>
                        <li>✅ Получить доступ к закрытой группе участников</li>
                        <li>✅ Вход через Google гарантирует сохранение вашей истории оплат</li>
                    </ul>
                    Для начала авторизуйтесь через кнопку ниже.
                `);
                const chatArea = document.getElementById('chatArea');
                const btnDiv = document.createElement('div');
                btnDiv.id = 'google-login-btn';
                btnDiv.style.margin = '10px 0';
                btnDiv.style.alignSelf = 'flex-start';
                chatArea.appendChild(btnDiv);
                google.accounts.id.renderButton(btnDiv, { theme: 'outline', size: 'large' });
                scrollToBottom();
            }, 500);
        }
    };
</script>
</body>
</html>
